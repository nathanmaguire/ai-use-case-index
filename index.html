<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Use Case Index 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0f1e 0%, #111827 50%, #0f172a 100%);
      color: #e2e8f0;
      line-height: 1.6;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      background: rgba(10, 15, 30, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(71, 85, 105, 0.2);
      transition: all 0.3s ease;
    }

    .navbar.scrolled {
      background: rgba(10, 15, 30, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(71, 85, 105, 0.4);
    }

    .navbar-brand {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .navbar-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e8f0;
      letter-spacing: 0.02em;
    }

    .navbar-subtitle {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .navbar-nav {
      display: flex;
      gap: 3rem;
      flex: 1;
      justify-content: center;
    }

    .nav-link {
      font-size: 0.875rem;
      color: #94a3b8;
      text-decoration: none;
      transition: all 0.2s ease;
      position: relative;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      padding: 0.5rem 0;
      font-weight: 500;
    }

    .nav-link:hover {
      color: #e2e8f0;
    }

    .nav-link.active {
      color: #3b82f6;
    }

    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      right: 0;
      height: 2px;
      background: #3b82f6;
      border-radius: 1px;
    }

    .navbar-burger {
      display: none;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      background: none;
      border: none;
    }

    .navbar-burger span {
      width: 24px;
      height: 2px;
      background: #e2e8f0;
      transition: all 0.3s ease;
    }

    /* MAIN LAYOUT */
    .main-container {
      width: 100%;
      margin-top: 80px;
      min-height: calc(100vh - 80px);
      padding: 2rem 2rem;
    }

    /* PERIODIC TABLE VIEW */
    .periodic-view {
      width: 100%;
    }

    .periodic-header {
      margin-bottom: 2rem;
    }

    .periodic-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .periodic-subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .periodic-controls {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      padding: 0.75rem 1rem;
      border: 1px solid rgba(71, 85, 105, 0.4);
      border-radius: 6px;
      background: rgba(30, 41, 59, 0.8);
      color: #e2e8f0;
      font-family: inherit;
      font-size: 0.875rem;
      transition: all 0.2s ease;
      flex: 1;
      min-width: 200px;
      max-width: 400px;
    }

    .search-input::placeholder {
      color: #64748b;
    }

    .search-input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(30, 41, 59, 0.95);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .filter-chips {
      display: flex;
      gap: 0.75rem;
    }

    .chip {
      padding: 0.5rem 1rem;
      border: 1px solid rgba(71, 85, 105, 0.4);
      border-radius: 20px;
      background: rgba(30, 41, 59, 0.8);
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .chip:hover {
      border-color: rgba(71, 85, 105, 0.6);
      color: #e2e8f0;
    }

    .chip.active {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .category-legend {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .legend-box {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      border: 2px solid currentColor;
    }

    .legend-item.horizontal .legend-box {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.15);
    }

    .legend-item.vertical .legend-box {
      border-color: #8b5cf6;
      background: rgba(139, 92, 246, 0.15);
    }

    .legend-item.technology .legend-box {
      border-color: #14b8a6;
      background: rgba(20, 184, 166, 0.15);
    }

    /* GRID */
    .periodic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
      gap: 1rem;
      width: 100%;
    }

    .periodic-cell {
      aspect-ratio: 3 / 4;
      border-radius: 8px;
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      border: 1.5px solid;
      position: relative;
      overflow: hidden;
      animation: cellFadeIn 0.3s ease forwards;
    }

    @keyframes cellFadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .periodic-cell.horizontal {
      background: rgba(59, 130, 246, 0.12);
      border-color: rgba(59, 130, 246, 0.4);
    }

    .periodic-cell.vertical {
      background: rgba(139, 92, 246, 0.12);
      border-color: rgba(139, 92, 246, 0.4);
    }

    .periodic-cell.technology {
      background: rgba(20, 184, 166, 0.12);
      border-color: rgba(20, 184, 166, 0.4);
    }

    .periodic-cell:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .periodic-cell.horizontal:hover {
      border-color: rgba(59, 130, 246, 0.8);
      background: rgba(59, 130, 246, 0.2);
    }

    .periodic-cell.vertical:hover {
      border-color: rgba(139, 92, 246, 0.8);
      background: rgba(139, 92, 246, 0.2);
    }

    .periodic-cell.technology:hover {
      border-color: rgba(20, 184, 166, 0.8);
      background: rgba(20, 184, 166, 0.2);
    }

    .periodic-cell.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .cell-rank {
      font-size: 0.65rem;
      color: #94a3b8;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .cell-abbrev {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.02em;
      margin: 0.25rem 0;
    }

    .cell-score {
      font-size: 0.8rem;
      font-weight: 600;
      color: #cbd5e1;
    }

    .cell-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(71, 85, 105, 0.6);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      white-space: nowrap;
      font-size: 0.75rem;
      color: #e2e8f0;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }

    .periodic-cell:hover .cell-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(-12px);
    }

    /* BROWSE VIEW */
    .browse-view {
      padding: 6rem 2rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .browse-search-section {
      text-align: center;
      margin-bottom: 3rem;
    }

    .browse-title {
      font-size: 2rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 0.5rem;
    }

    .browse-subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .browse-search-wrapper {
      position: relative;
      max-width: 700px;
      margin: 0 auto;
    }

    .browse-search-icon {
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: #64748b;
    }

    .browse-search-input {
      width: 100%;
      padding: 1rem 3rem 1rem 3.5rem;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(71, 85, 105, 0.4);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
    }

    .browse-search-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .browse-search-input::placeholder {
      color: #475569;
    }

    .browse-search-clear {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #64748b;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
    }

    .browse-search-clear:hover {
      color: #e2e8f0;
    }

    .browse-results-section {
      margin-bottom: 3rem;
    }

    .browse-results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .browse-section-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .browse-clear-btn {
      background: none;
      border: 1px solid rgba(71, 85, 105, 0.4);
      color: #94a3b8;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .browse-clear-btn:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: #3b82f6;
      color: #3b82f6;
    }

    .browse-results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .browse-result-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(71, 85, 105, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .browse-result-card:hover {
      transform: translateY(-3px);
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      background: rgba(30, 41, 59, 0.8);
    }

    .browse-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .browse-card-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .browse-card-score {
      font-size: 1.5rem;
      font-weight: 700;
      color: #3b82f6;
    }

    .browse-card-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 0.5rem;
    }

    .browse-card-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .browse-card-meta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .browse-card-sub, .browse-card-timeline, .browse-card-investment {
      font-size: 0.75rem;
      color: #64748b;
      background: rgba(71, 85, 105, 0.2);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }

    .browse-empty {
      text-align: center;
      color: #475569;
      padding: 3rem;
      font-size: 1rem;
    }

    /* Category browsing */
    .browse-categories-section {
      margin-bottom: 3rem;
    }

    .browse-categories-section > .browse-section-title {
      margin-bottom: 1.5rem;
    }

    .browse-category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    .browse-category-column {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(71, 85, 105, 0.3);
      border-radius: 12px;
      overflow: hidden;
    }

    .browse-category-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.5rem;
      border-left: 4px solid;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .browse-category-header:hover {
      background: rgba(71, 85, 105, 0.1);
    }

    .browse-cat-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .browse-cat-desc {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.4;
    }

    .browse-cat-count {
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-left: 1rem;
    }

    .browse-subcategories {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .browse-subcategories.expanded {
      max-height: 1000px;
    }

    .browse-subcategory-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      border-top: 1px solid rgba(71, 85, 105, 0.15);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .browse-subcategory-row:hover {
      background: rgba(59, 130, 246, 0.05);
    }

    .browse-subcategory-row:hover .browse-subcat-arrow {
      transform: translateX(4px);
      color: #3b82f6;
    }

    .browse-subcat-name {
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .browse-subcat-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .browse-subcat-count {
      font-size: 0.8rem;
      color: #64748b;
      background: rgba(71, 85, 105, 0.2);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    .browse-subcat-arrow {
      color: #475569;
      font-size: 0.9rem;
      transition: all 0.15s ease;
    }

    /* Industries */
    .browse-industries-section {
      margin-bottom: 3rem;
    }

    .browse-industries-section > .browse-section-title {
      margin-bottom: 1.25rem;
    }

    .browse-industry-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .browse-industry-tag {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.1rem;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(71, 85, 105, 0.3);
      border-radius: 8px;
      color: #cbd5e1;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .browse-industry-tag:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.3);
      color: #3b82f6;
    }

    .browse-tag-count {
      background: rgba(71, 85, 105, 0.3);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.75rem;
      color: #64748b;
    }

    /* RANKINGS VIEW */
    .rankings-view {
      width: 100%;
    }

    .rankings-header {
      margin-bottom: 2rem;
    }

    .rankings-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .distribution-chart {
      width: 100%;
      height: 120px;
      margin-bottom: 2rem;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(71, 85, 105, 0.3);
      border-radius: 8px;
      padding: 1rem;
      position: relative;
    }

    .distribution-dots {
      display: flex;
      align-items: flex-end;
      height: 100%;
      justify-content: space-around;
      gap: 0.5rem;
    }

    .distribution-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
      position: absolute;
    }

    .distribution-dot:hover {
      transform: scale(1.5);
      filter: brightness(1.2);
    }

    .rankings-controls {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .control-label {
      font-size: 0.875rem;
      color: #94a3b8;
      font-weight: 500;
    }

    .sort-select {
      padding: 0.5rem 0.75rem;
      border: 1px solid rgba(71, 85, 105, 0.4);
      border-radius: 4px;
      background: rgba(30, 41, 59, 0.8);
      color: #e2e8f0;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sort-select:hover {
      border-color: rgba(71, 85, 105, 0.6);
    }

    .sort-select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .rankings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .ranking-card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(71, 85, 105, 0.4);
      border-radius: 8px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .ranking-card:hover {
      border-color: rgba(71, 85, 105, 0.6);
      background: rgba(30, 41, 59, 0.95);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .rank-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      flex-shrink: 0;
    }

    .rank-circle.horizontal {
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
    }

    .rank-circle.vertical {
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
    }

    .rank-circle.technology {
      background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
    }

    .card-score {
      text-align: right;
    }

    .card-score-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .card-score-label {
      font-size: 0.65rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .card-subcategory {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .card-badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge.category {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .badge.category.vertical {

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // UTILITY FUNCTIONS
    const generateAbbrev = (name) => {
      const words = name.split(/\s+/).filter(w => !['and', 'of', 'the', 'ai', '&'].includes(w.toLowerCase()));
      if (words.length > 1) {
        return words.slice(0, 3).map(w => w[0].toUpperCase()).join('');
      } else {
        return words[0].substring(0, 3).toUpperCase();
      }
    };

    const calculateCompositeScore = (scores, weights) => {
      const baseWeights = {
        roi: 0.25,
        complexity: 0.15,
        maturity: 0.20,
        risk: 0.10,
        adoption: 0.15,
        readiness: 0.15,
      };

      const w = weights || baseWeights;
      const score =
        scores.roi * w.roi +
        (100 - scores.complexity) * w.complexity +
        scores.maturity * w.maturity +
        (100 - scores.risk) * w.risk +
        scores.adoption * w.adoption +
        scores.readiness * w.readiness;

      return Math.round(score);
    };

    const getCategoryColor = (category) => {
      if (category === 'Horizontal') return '#3b82f6';
      if (category === 'Vertical') return '#8b5cf6';
      return '#14b8a6';
    };

    // MAIN APP
    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeView, setActiveView] = useState('periodic');
      const [selectedUseCase, setSelectedUseCase] = useState(null);
      const [search, setSearch] = useState('');
      const [categoryFilter, setCategoryFilter] = useState('ALL');
      const [sortBy, setSortBy] = useState('rank');
      const [weights, setWeights] = useState({
        roi: 0.25,
        complexity: 0.15,
        maturity: 0.20,
        risk: 0.10,
        adoption: 0.15,
        readiness: 0.15,
      });
      const [compareIds, setCompareIds] = useState([]);
      const [scrolled, setScrolled] = useState(false);

      // Load data
      useEffect(() => {
        const loadData = async () => {
          try {
            const response = await fetch('./data/use-cases.json');
            const json = await response.json();
            setData(json);
          } catch (error) {
            console.error('Error loading data:', error);
            setData([]);
          } finally {
            setLoading(false);
          }
        };

        loadData();
      }, []);

      // Scroll listener for navbar effect
      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 10);
        };

        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Filter and sort data
      const filteredData = useMemo(() => {
        if (!data) return [];

        let filtered = [...data];

        // Filter by search — deep search across all key fields
        if (search) {
          const lowerSearch = search.toLowerCase();
          filtered = filtered.filter(
            (item) =>
              item.name.toLowerCase().includes(lowerSearch) ||
              item.description.toLowerCase().includes(lowerSearch) ||
              item.subcategory.toLowerCase().includes(lowerSearch) ||
              item.category.toLowerCase().includes(lowerSearch) ||
              (item.industry && item.industry.some(ind => ind.toLowerCase().includes(lowerSearch))) ||
              (item.howItWorks && item.howItWorks.toLowerCase().includes(lowerSearch)) ||
              (item.keyBenefits && item.keyBenefits.some(b => b.toLowerCase().includes(lowerSearch)))
          );
        }

        // Filter by category
        if (categoryFilter !== 'ALL') {
          filtered = filtered.filter((item) => item.category === categoryFilter);
        }

        // Calculate scores and sort
        filtered = filtered.map((item, idx) => ({
          ...item,
          score: calculateCompositeScore(item.scores, weights),
          rank: idx + 1,
        }));

        if (sortBy === 'rank') {
          filtered.sort((a, b) => b.score - a.score);
        } else if (sortBy === 'name') {
          filtered.sort((a, b) => a.name.localeCompare(b.name));
        }

        // Update rank after sorting
        filtered = filtered.map((item, idx) => ({
          ...item,
          rank: idx + 1,
        }));

        return filtered;
      }, [data, search, categoryFilter, sortBy, weights]);

      if (loading) {
        return (
          <div className="loading-container">
            <div className="loading-spinner"></div>
          </div>
        );
      }

      return (
        <>
          <Navbar
            activeView={activeView}
            onViewChange={setActiveView}
            scrolled={scrolled}
          />

          <div className="main-container">
            {activeView === 'periodic' && (
              <PeriodicView
                data={filteredData}
                search={search}
                onSearch={setSearch}
                categoryFilter={categoryFilter}
                onCategoryFilter={setCategoryFilter}
                onSelectUseCase={setSelectedUseCase}
              />
            )}

            {activeView === 'browse' && (
              <BrowseView
                data={data || []}
                weights={weights}
                search={search}
                onSearch={setSearch}
                onSelectUseCase={setSelectedUseCase}
                onViewChange={setActiveView}
                onCategoryFilter={setCategoryFilter}
              />
            )}

            {activeView === 'rankings' && (
              <RankingsView
                data={filteredData}
                sortBy={sortBy}
                onSortChange={setSortBy}
                categoryFilter={categoryFilter}
                onCategoryFilter={setCategoryFilter}
                onSelectUseCase={setSelectedUseCase}
              />
            )}

            {activeView === 'compare' && (
              <CompareView
                data={data || []}
                compareIds={compareIds}
                onCompareChange={setCompareIds}
                weights={weights}
              />
            )}

            {activeView === 'weights' && (
              <WeightsView
                weights={weights}
                onWeightsChange={setWeights}
                data={filteredData}
              />
            )}

            {activeView === 'insights' && (
              <InsightsView data={data || []} weights={weights} />
            )}
          </div>

          <DetailPanel
            useCase={selectedUseCase}
            onClose={() => setSelectedUseCase(null)}
            weights={weights}
          />

      const [selectedSubcategory, setSelectedSubcategory] = useState(null);
      const [selectedIndustry, setSelectedIndustry] = useState(null);

      // Build category → subcategory → use cases tree
      const categoryTree = useMemo(() => {
        const tree = {};
        data.forEach(item => {
          if (!tree[item.category]) tree[item.category] = {};
          if (!tree[item.category][item.subcategory]) tree[item.category][item.subcategory] = [];
          tree[item.category][item.subcategory].push({
            ...item,
            score: calculateCompositeScore(item.scores, weights)
          });
        });
        // Sort each subcategory by score
        Object.values(tree).forEach(subcats => {
          Object.keys(subcats).forEach(key => {
            subcats[key].sort((a, b) => b.score - a.score);
          });
        });
        return tree;
      }, [data, weights]);

      // Build industry list

        const indMap = {};

              indMap[ind]++;

    function RadarChart({ items }) {
      const svgRef = useRef();

      useEffect(() => {
        if (!svgRef.current || items.length === 0) return;

        const width = 400;
        const height = 400;
        const margin = 60;

        const svg = d3.select(svgRef.current);
        svg.selectAll('*').remove();

        const g = svg
          .attr('width', width)
          .attr('height', height)
          .append('g')
          .attr('transform', `translate(${width / 2},${height / 2})`);

        const angleSlice = (Math.PI * 2) / 6;
        const radius = (width - margin * 2) / 2;

        // Draw axes
        const axisLabels = ['ROI', 'Complexity', 'Maturity', 'Risk', 'Adoption', 'Readiness'];
        const axes = d3.range(6);

        axes.forEach((d, i) => {
          const angle = angleSlice * i - Math.PI / 2;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;

          g.append('line')
            .attr('x1', 0)
            .attr('y1', 0)
            .attr('x2', x)
            .attr('y2', y)
            .style('stroke', 'rgba(71, 85, 105, 0.3)')
            .style('stroke-width', 1);

          g.append('text')
            .attr('x', Math.cos(angle) * (radius + 30))
            .attr('y', Math.sin(angle) * (radius + 30))
            .attr('text-anchor', 'middle')
            .attr('dy', '0.35em')
            .style('fill', '#94a3b8')
            .style('font-size', '12px')
            .style('font-weight', '500')
            .text(axisLabels[i]);
        });

        // Draw circles
        d3.range(1, 6).forEach((i) => {
          g.append('circle')
            .attr('r', (radius / 5) * i)
            .style('fill', 'none')
            .style('stroke', 'rgba(71, 85, 105, 0.2)')
            .style('stroke-width', 1);
        });

        // Draw data
        items.forEach((item, itemIdx) => {
          const color = getCategoryColor(item.category);
          const values = [
            item.scores.roi,
            100 - item.scores.complexity,
            item.scores.maturity,
            100 - item.scores.risk,
            item.scores.adoption,
            item.scores.readiness,
          ];

          const points = values.map((value, i) => {
            const angle = angleSlice * i - Math.PI / 2;
            const r = (value / 100) * radius;
            return [Math.cos(angle) * r, Math.sin(angle) * r];
          });

          // Draw polygon
          const pathData = points.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`));
          g.append('path')
            .attr('fill', color)
            .attr('fill-opacity', 0.1 + itemIdx * 0.1)
            .attr('stroke', color)
            .attr('stroke-width', 2)
            .attr('stroke-linejoin', 'round')
            .attr('d', pathData.join(' ') + 'Z');

          // Draw points
          points.forEach((p) => {
            g.append('circle')
              .attr('cx', p[0])
              .attr('cy', p[1])
              .attr('r', 4)
              .attr('fill', color)
              .attr('stroke', 'rgba(15, 23, 42, 1)')
              .attr('stroke-width', 2);
          });
        });
      }, [items]);

      return <svg ref={svgRef}></svg>;
    }

                  type="range"
                  min="0"
                  max="100"
                  value={weights.roi * 100}
                  onChange={(e) => handleWeightChange('roi', e.target.value)}
                  className="slider"
                />
              </div>

              <div className="weight-control">
                <div className="weight-label">
                  <span className="weight-name">Complexity (inverted)</span>
                  <span className="weight-value">{Math.round(weights.complexity * 100)}%</span>
                </div>
                <input
                  type="range"
                  min="0"
                  max="100"
                  value={weights.complexity * 100}
                  onChange={(e) => handleWeightChange('complexity', e.target.value)}
                  className="slider"
                />
              </div>

              <div className="weight-control">
                <div className="weight-label">
                  <span className="weight-name">Maturity</span>
                  <span className="weight-value">{Math.round(weights.maturity * 100)}%</span>
                </div>
                <input
                  type="range"
                  min="0"
                  max="100"
                  value={weights.maturity * 100}
                  onChange={(e) => handleWeightChange('maturity', e.target.value)}
                  className="slider"
                />
              </div>

              <div className="weight-control">
                <div className="weight-label">
                  <span className="weight-name">Risk (inverted)</span>
                  <span className="weight-value">{Math.round(weights.risk * 100)}%</span>
                </div>
                <input
                  type="range"
                  min="0"
                  max="100"
                  value={weights.risk * 100}
                  onChange={(e) => handleWeightChange('risk', e.target.value)}
                  className="slider"
                />
              </div>

              <div className="weight-control">
                <div className="weight-label">
                  <span className="weight-name">Adoption</span>
                  <span className="weight-value">{Math.round(weights.adoption * 100)}%</span>
                </div>
                <input
                  type="range"
                  min="0"
                  max="100"
                  value={weights.adoption * 100}
                  onChange={(e) => handleWeightChange('adoption', e.target.value)}
                  className="slider"
                />
              </div>

              <div className="weight-control">
                <div className="weight-label">
                  <span className="weight-name">Readiness</span>
                  <span className="weight-value">{Math.round(weights.readiness * 100)}%</span>
                </div>
                <input
                  type="range"
                  min="0"
                  max="100"
                  value={weights.readiness * 100}
                  onChange={(e) => handleWeightChange('readiness', e.target.value)}
                  className="slider"
                />
              </div>

              <div style={{ marginTop: '1.5rem', padding: '1rem', background: 'rgba(15, 23, 42, 0.5)', borderRadius: '4px' }}>
                <div style={{ fontSize: '0.75rem', color: '#94a3b8', marginBottom: '0.5rem' }}>
                  TOTAL WEIGHT
                </div>
                <div style={{ fontSize: '1.3rem', color: totalWeight === 1 ? '#14b8a6' : '#f87171', fontWeight: 700 }}>
                  {Math.round(totalWeight * 100)}%
                </div>
              </div>

              <div className="weights-actions">
                <button className="btn-primary" onClick={handleReset}>
                  Reset Defaults
                </button>
              </div>
            </div>

            <div className="top-10-list">
              <div className="top-10-title">Top 10 by Current Weights</div>
              {top10.map((item, idx) => (
                <div key={item.id} className="rank-item">
                  <div className="rank-number">{idx + 1}</div>
                  <div className="rank-info">
                    <div className="rank-info-name">{item.name}</div>
                    <div className="rank-info-score">{item.subcategory}</div>
                  </div>
                  <div className="rank-score">{item.score}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // INSIGHTS VIEW
    function InsightsView({ data, weights }) {
      const avgScore =
        data.length > 0
          ? Math.round(
            data.reduce((sum, item) => sum + calculateCompositeScore(item.scores, weights), 0) /
            data.length
          )
          : 0;

      const categories = {};
      data.forEach((item) => {
        if (!categories[item.category]) {
          categories[item.category] = 0;
        }
        categories[item.category]++;
      });

      const topCategory = Object.entries(categories).sort((a, b) => b[1] - a[1])[0];

      return (
        <div className="insights-view">
          <div className="insights-header">
            <h1 className="insights-title">Market Insights</h1>
          </div>

          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-value">{data.length}</div>
              <div className="stat-label">Total Use Cases</div>
            </div>

            <div className="stat-card">
              <div className="stat-value">{avgScore}</div>
              <div className="stat-label">Average Score</div>
            </div>

            <div className="stat-card">
              <div className="stat-value">{topCategory ? topCategory[1] : 0}</div>
              <div className="stat-label">
                Top Category: {topCategory ? topCategory[0] : '-'}
              </div>
            </div>

            <div className="stat-card">
              <div className="stat-value">
                {data.filter((item) => calculateCompositeScore(item.scores, weights) >= 75).length}
              </div>
              <div className="stat-label">High-Value Use Cases</div>
            </div>
          </div>

          <div className="chart-section">
            <h2 className="section-title">Category Distribution</h2>
            <div className="bar-chart">
              <CategoryChart data={Object.entries(categories)} />
            </div>
          </div>

          <div className="chart-section">
            <h2 className="section-title">Score Distribution</h2>
            <div className="bar-chart">
              <ScoreDistributionChart data={data} weights={weights} />
            </div>
          </div>
        </div>
      );
    }

    function CategoryChart({ data }) {
      const svgRef = useRef();

      useEffect(() => {
        if (!svgRef.current) return;

        const width = 600;
        const height = 300;
        const margin = { top: 20, right: 20, bottom: 30, left: 100 };

        const svg = d3.select(svgRef.current);
        svg.selectAll('*').remove();

        const colors = { Horizontal: '#3b82f6', Vertical: '#8b5cf6', Technology: '#14b8a6' };
        const chartData = data.map(([name, count]) => ({ name, count }));

        const yScale = d3
          .scaleBand()
          .domain(chartData.map((d) => d.name))
          .range([0, height - margin.top - margin.bottom])
          .padding(0.3);

        const xScale = d3
          .scaleLinear()
          .domain([0, Math.max(...chartData.map((d) => d.count))])
          .range([0, width - margin.left - margin.right]);

        const g = svg
          .attr('width', width)
          .attr('height', height)
          .append('g')
          .attr('transform', `translate(${margin.left},${margin.top})`);

        g.selectAll('rect')
          .data(chartData)
          .enter()
          .append('rect')
          .attr('y', (d) => yScale(d.name))
          .attr('height', yScale.bandwidth())
          .attr('width', (d) => xScale(d.count))
          .attr('fill', (d) => colors[d.name] || '#3b82f6');

        g.append('g')
          .attr('transform', `translate(0,${height - margin.top - margin.bottom})`)
          .call(d3.axisBottom(xScale));

        g.append('g').call(
          d3.axisLeft(yScale).tickFormat((d) => d)
        );
      }, [data]);

      return <svg ref={svgRef}></svg>;
    }

    function ScoreDistributionChart({ data, weights }) {
      const svgRef = useRef();

      useEffect(() => {
        if (!svgRef.current) return;

        const width = 600;
        const height = 300;
        const margin = { top: 20, right: 20, bottom: 30, left: 60 };

        const svg = d3.select(svgRef.current);
        svg.selectAll('*').remove();

        const scores = data.map((item) => calculateCompositeScore(item.scores, weights));
        const binData = d3
          .bin()
          .domain([0, 100])
          .thresholds(10)(scores);

        const xScale = d3
          .scaleLinear()
          .domain([0, 100])
          .range([0, width - margin.left - margin.right]);

        const yScale = d3
          .scaleLinear()
          .domain([0, Math.max(...binData.map((d) => d.length))])
          .range([height - margin.top - margin.bottom, 0]);

        const g = svg
          .attr('width', width)
          .attr('height', height)
          .append('g')
          .attr('transform', `translate(${margin.left},${margin.top})`);

        g.selectAll('rect')
          .data(binData)
          .enter()
          .append('rect')
          .attr('x', (d) => xScale(d.x0))
          .attr('width', (d) => Math.max(0, xScale(d.x1) - xScale(d.x0) - 1))
          .attr('y', (d) => yScale(d.length))
          .attr('height', (d) => height - margin.top - margin.bottom - yScale(d.length))
          .attr('fill', '#3b82f6');

        g.append('g')
          .attr('transform', `translate(0,${height - margin.top - margin.bottom})`)
          .call(d3.axisBottom(xScale));

        g.append('g').call(d3.axisLeft(yScale));
      }, [data, weights]);

      return <svg ref={svgRef}></svg>;
    }

    // DETAIL PANEL
    function DetailPanel({ useCase, onClose, weights }) {
      useEffect(() => {
        const handleEscape = (e) => {
          if (e.key === 'Escape') onClose();
        };

        if (useCase) {
          document.addEventListener('keydown', handleEscape);
          return () => document.removeEventListener('keydown', handleEscape);
        }
      }, [useCase, onClose]);

      if (!useCase) {
        return (
          <div
            className="detail-panel-overlay"
            onClick={onClose}
          ></div>
        );
      }

      const score = calculateCompositeScore(useCase.scores, weights);

      return (
        <>
          <div className="detail-panel-overlay open" onClick={onClose}></div>

          <div className="detail-panel open">
            <div className="detail-header">
              <button className="detail-close" onClick={onClose}>
                ×
              </button>

              <div className="detail-name">{useCase.name}</div>

              <div className="detail-badges">
                <span
                  className="badge category"
                  style={{
                    background: getCategoryColor(useCase.category) + '26',
                    color: getCategoryColor(useCase.category),
                  }}
                >
                  {useCase.category}
                </span>
                <span
                  className="badge category"
                  style={{
                    background: 'rgba(71, 85, 105, 0.2)',
                    color: '#cbd5e1',
                  }}
                >
                  {useCase.subcategory}
                </span>
              </div>
            </div>

            <div className="detail-body">
              <div className="detail-section">
                <h3 className="detail-section-title">Composite Score</h3>
                <div style={{ fontSize: '2rem', fontWeight: 700, color: '#3b82f6', marginBottom: '1rem' }}>
                  {score}
                </div>
              </div>

              <div className="detail-section">
                <h3 className="detail-section-title">Score Breakdown</h3>
                <div className="score-bar">
                  <div className="score-bar-label">ROI</div>
                  <div className="score-bar-value">
                    <div
                      className="score-bar-fill"
                      style={{ width: `${useCase.scores.roi}%` }}
                    ></div>
                  </div>
                  <div className="score-bar-number">{useCase.scores.roi}</div>
                </div>

                <div className="score-bar">
                  <div className="score-bar-label">Complexity</div>
                  <div className="score-bar-value">
                    <div
                      className="score-bar-fill"
                      style={{ width: `${100 - useCase.scores.complexity}%` }}
                    ></div>
                  </div>
                  <div className="score-bar-number">{useCase.scores.complexity}</div>
                </div>

                <div className="score-bar">
                  <div className="score-bar-label">Maturity</div>
                  <div className="score-bar-value">
                    <div
                      className="score-bar-fill"
                      style={{ width: `${useCase.scores.maturity}%` }}
                    ></div>
                  </div>
                  <div className="score-bar-number">{useCase.scores.maturity}</div>
                </div>

                <div className="score-bar">
                  <div className="score-bar-label">Risk</div>
                  <div className="score-bar-value">
                    <div
                      className="score-bar-fill"
                      style={{ width: `${100 - useCase.scores.risk}%` }}
                    ></div>
                  </div>
                  <div className="score-bar-number">{useCase.scores.risk}</div>
                </div>

                <div className="score-bar">
                  <div className="score-bar-label">Adoption</div>
                  <div className="score-bar-value">
                    <div
                      className="score-bar-fill"
                      style={{ width: `${useCase.scores.adoption}%` }}
                    ></div>
                  </div>
                  <div className="score-bar-number">{useCase.scores.adoption}</div>
                </div>

                <div className="score-bar">
                  <div className="score-bar-label">Readiness</div>
                  <div className="score-bar-value">
                    <div
                      className="score-bar-fill"
                      style={{ width: `${useCase.scores.readiness}%` }}
                    ></div>
                  </div>
                  <div className="score-bar-number">{useCase.scores.readiness}</div>
                </div>
              </div>

              <div className="detail-section">
                <h3 className="detail-section-title">How It Works</h3>
                <div className="detail-text">{useCase.howItWorks}</div>
              </div>

              <div className="detail-section">
                <h3 className="detail-section-title">Business Requirements</h3>
                <ul className="detail-list">
                  {useCase.businessRequirements.map((req, idx) => (
                    <li key={idx}>{req}</li>
                  ))}
                </ul>
              </div>

              <div className="detail-section">
                <h3 className="detail-section-title">Technical Requirements</h3>
                <ul className="detail-list">
                  {useCase.technicalRequirements.map((req, idx) => (
                    <li key={idx}>{req}</li>
                  ))}
                </ul>
              </div>

              <div className="detail-section">
                <h3 className="detail-section-title">Key Benefits</h3>
                <ul className="detail-list">
                  {useCase.keyBenefits.map((benefit, idx) => (
                    <li key={idx}>{benefit}</li>
                  ))}
                </ul>
              </div>

              <div className="detail-section">
                <h3 className="detail-section-title">Real-World Examples</h3>
                <ul className="detail-list">
                  {useCase.examples.map((example, idx) => (
                    <li key={idx}>{example}</li>
                  ))}
                </ul>
              </div>

              <div className="detail-section">
                <h3 className="detail-section-title">Timeline</h3>
                <div className="detail-text">{useCase.timeline}</div>
              </div>

              <div className="detail-section">
                <h3 className="detail-section-title">Investment Level</h3>
                <div className="detail-text">{useCase.investmentLevel}</div>
              </div>
            </div>
          </div>
        </>
      );
    }

    // RENDER
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
